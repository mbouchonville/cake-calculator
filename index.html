<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cake Cost Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Cake Cost Calculator</h1>

    <h2>Ingredient Costs</h2>

<div class="ingredient-card">
    <h3>Cake Mix:</h3>

    <label>Box Price:</label>
    <input type="number" id="cakeMixPrice" step="0.01">

    <label>Boxes Used:</label>
    <input type="number" id="cakeMixUsed" step="0.01">
</div>

<div class="ingredient-card">
    <h3>Butter:</h3>

    <label>Box Price:</label>
    <input type="number" id="butterPrice" step="0.01">

    <label>Sticks In Box:</label>
    <input type="number" id="butterPackageAmount" step="0.01">

    <label>Sticks Used:</label>
    <input type="number" id="butterUsed" step="0.01">
</div>

<div class="ingredient-card">
    <h3>Milk:</h3>

    <label>Container Price:</label>
    <input type="number" id="milkPrice" step="0.01">

    <label>Cups In Container:</label>
    <input type="number" id="milkContainerAmount" step="0.01">

    <label>Cups Used:</label>
    <input type="number" id="milkUsed" step="0.01">
    
</div>

<div class="ingredient-card">
    <h3>Eggs:</h3>

    <label>Carton Price:</label>
    <input type="number" id="eggPrice" step="0.01">

    <label>Eggs Per Carton:</label>
    <input type="number" id="eggCartonAmount" step="0.01">

    <label>Eggs Used:</label>
    <input type="number" id="eggsUsed" step="0.01">
</div>

<div class="ingredient-card">
    <h3>Powdered Sugar:</h3>

    <label>Bag Price:</label>
    <input type="number" id="powderedSugarPrice" step="0.01">

    <label>Cups Per Bag:</label>
    <input type="number" id="powderedSugarAmount" step="0.01">

    <label>Cups Used:</label>
    <input type="number" id="powderedSugarUsed" step="0.01">
</div>

<button onclick="calculateIngredients()">
    Calculate Ingredients
</button>

<h3 id="ingredientTotal">
    Ingredient Total: $0
</h3>
    <script src="script.js"></script>
</body>
</html>
