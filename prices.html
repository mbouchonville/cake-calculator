<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Saved Prices</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Edit Saved Prices</h1>

    <h2>Ingredient Costs</h2>

<div class="ingredients-container">

<div class="input-group">
    <h3>Cake Mix:</h3>
    <label>Box Price:</label>
    <input type="number" id="cakeMixPrice" step="0.01">
</div>

<div class="input-group">
    <h3>Butter:</h3>

    <label>Box Price:</label>
    <input type="number" id="butterPrice" step="0.01">

    <label>Sticks In Box:</label>
    <input type="number" id="butterAmount" step="0.01">
</div>

<div class="input-group">
    <h3>Milk:</h3>

    <label>Container Price:</label>
    <input type="number" id="milkPrice" step="0.01">

    <label>Cups In Container:</label>
    <input type="number" id="milkAmount" step="0.01">
</div>

<div class="input-group">
    <h3>Eggs:</h3>

    <label>Carton Price:</label>
    <input type="number" id="eggPrice" step="0.01">

    <label>Eggs Per Carton:</label>
    <input type="number" id="eggAmount" step="0.01">
</div>

<div class="input-group">
    <h3>Powdered Sugar:</h3>

    <label>Bag Price:</label>
    <input type="number" id="powderedSugarPrice" step="0.01">

    <label>Cups Per Bag:</label>
    <input type="number" id="powderedSugarAmount" step="0.01">
</div>
</div>

<button id="savePricesButton">
    Save Prices
</button>

    <script src="prices.js"></script>
</body>
</html>
